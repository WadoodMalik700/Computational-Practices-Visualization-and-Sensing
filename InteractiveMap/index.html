<!DOCTYPE html>
<html>
<head>
    <title>London Urban Conditions Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>London Urban Conditions Map</h2>

<div id="controls">
    <button onclick="showAll()">Show All</button>
    <button onclick="filterData('high')">High Intensity</button>
    <button onclick="filterData('medium')">Medium Intensity</button>
    <button onclick="filterData('low')">Low Intensity</button>
</div>

<div id="legend">
    <h3>Key</h3>
    <p><span class="box red"></span> High intensity</p>
    <p><span class="box orange"></span> Medium intensity</p>
    <p><span class="box green"></span> Low intensity</p>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
